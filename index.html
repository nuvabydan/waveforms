<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ONYXX Test Store</title>

<style>
body {
  margin: 0;
  font-family: system-ui, -apple-system, sans-serif;
  background: #f5f5f7;
}

header {
  background: #000;
  color: white;
  padding: 16px 24px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

h1 { font-size: 18px; margin: 0; }

.cart-btn {
  background: white;
  color: black;
  padding: 8px 14px;
  border-radius: 20px;
  cursor: pointer;
  font-weight: 600;
}

.products {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
  gap: 20px;
  padding: 30px;
}

.product {
  background: white;
  padding: 16px;
  border-radius: 16px;
  box-shadow: 0 4px 20px rgba(0,0,0,0.05);
}

.product img {
  width: 100%;
  border-radius: 12px;
}

.product h3 {
  margin: 10px 0 6px;
  font-size: 16px;
}

.product p {
  margin: 0 0 10px;
  font-weight: 600;
}

.product button {
  width: 100%;
  padding: 10px;
  background: black;
  color: white;
  border: none;
  border-radius: 10px;
  cursor: pointer;
}

.cart {
  position: fixed;
  right: 0;
  top: 0;
  width: 350px;
  height: 100%;
  background: white;
  box-shadow: -4px 0 20px rgba(0,0,0,0.1);
  padding: 20px;
  transform: translateX(100%);
  transition: 0.3s ease;
  overflow-y: auto;
}

.cart.active {
  transform: translateX(0);
}

.cart h2 {
  margin-top: 0;
}

.cart-item {
  display: flex;
  justify-content: space-between;
  margin-bottom: 10px;
}

.checkout-form input {
  width: 100%;
  padding: 8px;
  margin-bottom: 10px;
  border-radius: 8px;
  border: 1px solid #ddd;
}

.checkout-form button {
  width: 100%;
  padding: 12px;
  background: black;
  color: white;
  border: none;
  border-radius: 12px;
  font-weight: bold;
}
</style>
</head>
<body>

<header>
  <h1>ONYXX Store</h1>
  <div class="cart-btn" onclick="toggleCart()">Cart (<span id="cart-count">0</span>)</div>
</header>

<div class="products" id="product-list"></div>

<div class="cart" id="cart">
  <h2>Your Cart</h2>
  <div id="cart-items"></div>
  <hr />
  <p><strong>Total: $<span id="cart-total">0.00</span></strong></p>

  <form class="checkout-form" onsubmit="submitOrder(event)">
    <input name="customer_name" placeholder="Full Name" required />
    <input name="customer_email" type="email" placeholder="Email" required />
    <input name="shipping_address" placeholder="Shipping Address" required />
    <button type="submit">Complete Order</button>
  </form>
</div>

<script>
const products = [
  { id: 1, name: "ONYXX Hoodie", price: 59.99, image: "https://picsum.photos/400?1" },
  { id: 2, name: "ONYXX Sneakers", price: 129.99, image: "https://picsum.photos/400?2" },
  { id: 3, name: "ONYXX Cap", price: 29.99, image: "https://picsum.photos/400?3" }
];

let cart = [];

function renderProducts() {
  const container = document.getElementById("product-list");
  container.innerHTML = products.map(p => `
    <div class="product">
      <img src="${p.image}" />
      <h3>${p.name}</h3>
      <p>$${p.price}</p>
      <button onclick="addToCart(${p.id})">Add to Cart</button>
    </div>
  `).join("");
}

function addToCart(id) {
  const product = products.find(p => p.id === id);
  const existing = cart.find(i => i.id === id);

  if (existing) {
    existing.quantity++;
  } else {
    cart.push({ ...product, quantity: 1 });
  }

  updateCart();
}

function updateCart() {
  document.getElementById("cart-count").textContent =
    cart.reduce((sum, i) => sum + i.quantity, 0);

  const cartItems = document.getElementById("cart-items");
  cartItems.innerHTML = cart.map(i => `
    <div class="cart-item">
      <span>${i.name} x${i.quantity}</span>
      <span>$${(i.price * i.quantity).toFixed(2)}</span>
    </div>
  `).join("");

  const total = cart.reduce((sum, i) => sum + i.price * i.quantity, 0);
  document.getElementById("cart-total").textContent = total.toFixed(2);
}

function toggleCart() {
  document.getElementById("cart").classList.toggle("active");
}

function submitOrder(e) {
  e.preventDefault();
  const f = e.target;

  const orderData = {
    customer_name: f.customer_name.value,
    customer_email: f.customer_email.value,
    shipping_address: f.shipping_address.value,
    items: cart.map(i => ({
      product_name: i.name,
      quantity: i.quantity,
      unit_price: i.price
    }))
  };

  fetch('https://stream-commerce-pro.base44.app/api/orders', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      ...orderData,
      source: 'storefront',
      order_number: 'WEB-' + Date.now().toString(36).toUpperCase(),
      status: 'pending'
    })
  })
  .then(res => res.json())
  .then(data => {
    alert("Order sent to ONYXX backend!");
    cart = [];
    updateCart();
    toggleCart();
  })
  .catch(err => alert("Error submitting order"));
}

renderProducts();
</script>

</body>
</html>
